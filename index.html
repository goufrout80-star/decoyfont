<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Decoy Studio</title><style>body{margin:0;background:#10110f;color:#fff;font:14px system-ui;display:grid;place-items:center;min-height:100vh}.l{text-align:center}.s{width:34px;height:34px;border:3px solid #555;border-top-color:#ff5b36;border-radius:50%;margin:0 auto 14px;animation:r .8s linear infinite}@keyframes r{to{transform:rotate(360deg)}}</style></head><body><div class="l"><div class="s"></div>Loading Decoy Studio…</div><script>(async()=>{try{let s='';for(let i=1;i<=3;i++)s+=await(await fetch(`payload-${i}.txt`)).text();const b=Uint8Array.from(atob(s),c=>c.charCodeAt(0));const t=await new Response(new Blob([b]).stream().pipeThrough(new DecompressionStream('gzip'))).text();document.open();document.write(t);document.close()}catch(e){document.body.innerHTML='<p>Decoy Studio needs a modern browser.</p>';console.error(e)}})()</script></body></html>
